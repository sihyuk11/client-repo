name: tcp-client-ci-cd

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/client_repo:latest .

      - name: push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/client_repo:latest

