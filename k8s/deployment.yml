apiVersion: apps/v1
kind: Deployment

metadata:
  name: tcp-client

spec:
  replicas: 1

  selector:
    matchLabels:
      app: tcp-client

  template:
    metadata:
      labels:
        app: tcp-client

    spec:
      containers:
      - name: tcp-client
        image: sihyuk11/client_repo:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 9090
